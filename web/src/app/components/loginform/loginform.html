<form
  [formGroup]="loginForm"
  (ngSubmit)="iniciarSesion()"
  class="pb-5 border-b border-accent"
>

  <!-- Subtitle -->
  <h2 class="mb-8 text-center text-2xl font-semibold">
    Ingresar
  </h2>

  @if(!!errorMessage() ){
  <div  class="mb-4 text-red-600 text-sm text-center font-medium">
    {{ errorMessage() }}
  </div>
  }

  <!-- Email Input -->
  <div class="mb-6">
    <input
      type="email"
      placeholder="Correo Electrónico"
      id="email"
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition"
      formControlName="email"
      required
    />
    <label for="email" class="block text-sm font-medium mt-1">
      Correo Electrónico
    </label>
  </div>

  <!-- Password Input -->
  <div class="mb-6">
    <input
      type="password"
      placeholder="Contraseña"
      id="password"
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition"
      formControlName="password"
      required
    />
    <label for="password" class="block text-sm font-medium mt-1">
      Contraseña
    </label>
  </div>

  <!-- ReCAPTCHA Placeholder -->
  <div class="mb-6">
    <div class="flex justify-center">
      <div id="html_element" class="w-full"></div>
    </div>
  </div>

  <!-- Submit Button -->
  <div class="text-center mb-4">
    <button
      type="submit"
      class="w-full py-3 px-4 bg-primary text-white font-bold rounded-lg hover:bg-accent transition"
    >
      Iniciar Sesión
    </button>
  </div>
            <a href="forgotpassword" class="text-center text-sm text-gray-500 hover:text-gray-700">
            Olvidaste tu contraseña?
          </a>

</form>
